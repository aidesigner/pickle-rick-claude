name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          # R-CIFB: align CI to the project's actual target (CLAUDE.md = Node 25;
          # dev runs 25.x). node 22's test runner is stricter about unsettled
          # file-level promises, failing whole files ('Promise resolution is still
          # pending') that pass on 24/25. node 24 is the current LTS-track.
          node-version: '24'

      - name: Install and test
        # R-CIFB: point getExtensionRoot() at the checked-out repo (sentinel
        # extension/bin/log-watcher.js is committed) instead of the deployed
        # ~/.claude/pickle-rick, which CI never creates (no install.sh).
        env:
          EXTENSION_DIR: ${{ github.workspace }}
        run: cd extension && npm ci && npx tsc --noEmit && npx eslint src/ --max-warnings=-1 && npx tsc && bash scripts/audit-test-tiers.sh && bash scripts/audit-test-isolation.sh && bash scripts/audit-subprocess-heavy-tests.sh && bash scripts/audit-fix-commits.sh && bash scripts/audit-bundle-thesis.sh && bash scripts/audit-quarantine.sh && bash scripts/audit-trap-door-enforcement.sh && bash scripts/audit-guarded-reset.sh && bash scripts/audit-design-ground-truth.sh && npm run test:fast:budget && npm run test:integration && RUN_EXPENSIVE_TESTS=1 npm run test:expensive
