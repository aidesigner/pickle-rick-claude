name: Stability Gate

on:
  workflow_dispatch:
    inputs:
      run_count:
        description: Number of consecutive test:fast passes required
        required: false
        default: '10'
      ref:
        description: Git ref (branch, tag, or commit SHA) to test. Defaults to the dispatch ref.
        required: false
        default: ''
  pull_request:
    paths:
      - extension/tests/auto-resume-stop-conditions.test.js
      - extension/tests/council-publish.test.js
      - extension/tests/ensure-monitor-window.test.js
      - extension/tests/mux-runner-relaunch.test.js
      - extension/tests/.serial-tests-fast.json

jobs:
  stability-gate:
    runs-on: ubuntu-latest
    env:
      RUN_COUNT: ${{ inputs.run_count || '10' }}
      # R-CIFB: point getExtensionRoot() at the checked-out repo (sentinel
      # extension/bin/log-watcher.js is committed) instead of the deployed
      # ~/.claude/pickle-rick, which CI never creates (no install.sh).
      EXTENSION_DIR: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}
          # R-CIFB: full history (match ci.yml) — git-history-dependent tests
          # (e.g. runGate scope=changed since=HEAD~1) fail on the default shallow
          # depth-1 checkout, an artifact of this gate, not a real ci.yml failure.
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          # R-CIFB: align to the project's Node 25 target (see ci.yml note).
          node-version: '24'

      - name: Install extension dependencies
        working-directory: extension
        run: npm ci

      - name: Run test:fast repeatedly
        working-directory: extension
        shell: bash
        run: |
          mkdir -p ../stability-gate-logs
          for i in $(seq 1 "$RUN_COUNT"); do
            log_file="../stability-gate-logs/test-fast-pass-${i}.log"
            echo "=== Pass $i/$RUN_COUNT ==="
            echo "=== Pass $i/$RUN_COUNT ===" > "$log_file"
            npm run test:fast 2>&1 | tee -a "$log_file" || exit 1
          done

      - name: Upload stability logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: stability-gate-logs
          path: stability-gate-logs/
