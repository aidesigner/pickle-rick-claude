name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '22.x'

      - name: Install and compile
        run: cd extension && npm ci && npx tsc --noEmit && npx eslint src/ --max-warnings=-1 && npx tsc && bash scripts/audit-test-tiers.sh && bash scripts/audit-test-isolation.sh && bash scripts/audit-subprocess-heavy-tests.sh && bash scripts/audit-fix-commits.sh && bash scripts/audit-bundle-thesis.sh && bash scripts/audit-quarantine.sh && bash scripts/audit-trap-door-enforcement.sh && bash scripts/audit-guarded-reset.sh && bash scripts/audit-design-ground-truth.sh && bash scripts/audit-un-terminalize-single-path.sh && npm run test:fast:budget && npm run test:integration && RUN_EXPENSIVE_TESTS=1 npm run test:expensive

      - name: Build tarball
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          tar -czf "pickle-rick-${VERSION}.tar.gz" \
            extension/bin/ \
            extension/services/ \
            extension/types/ \
            extension/hooks/ \
            extension/scripts/ \
            extension/layouts/ \
            extension/eslint-plugin-pickle/ \
            extension/package.json \
            install.sh \
            .claude/commands/ \
            pickle_settings.json \
            persona.md
          echo "TARBALL=pickle-rick-${VERSION}.tar.gz" >> "$GITHUB_ENV"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: ${{ env.TARBALL }}
