name: R-CIFB Debug (Linux per-file diagnosis)

# Diagnostic-only workflow for R-CIFB #115: runs the known CI-only-failing test
# files INDIVIDUALLY on the CI Linux/node24 runner with EXTENSION_DIR set, so
# each failure's error block is clean (no c=8 interleaving). NOT a gate — never
# blocks merges. Remove once R-CIFB is closed.
on:
  workflow_dispatch:

jobs:
  rcifb-debug:
    runs-on: ubuntu-latest
    env:
      EXTENSION_DIR: ${{ github.workspace }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      - name: Enable corepack (pnpm/yarn on PATH)
        # R-CIFB / WS-C: convergence-gate runGate detects pnpm-workspace fixtures as
        # 'pnpm' and runs `pnpm test`. setup-node@v4 ships npm/npx but NOT pnpm, so
        # the gate's detectMissingTools(['pnpm']) short-circuits red. corepack puts
        # pnpm on PATH for the sibling pnpm-path tests (e.g.
        # convergence-gate-flake-allowlist.test.js). The in-scope
        # convergence-gate-workspaces fixture was made pnpm-independent (npm
        # workspaces) by ticket b6e2185a; this step is additive insurance.
        run: corepack enable
      - name: Install extension dependencies
        working-directory: extension
        run: npm ci
      - name: Linux environment probe (R-CIFB root-cause facts)
        working-directory: extension
        shell: bash
        run: |
          echo "=== pid_max ===" && cat /proc/sys/kernel/pid_max || true
          echo "=== isProcessAlive(pid) behavior on Linux ==="
          node -e "for(const p of [99999999,2147483647,4194305,1000000,1]){try{process.kill(p,0);console.log(p,'ALIVE')}catch(e){console.log(p,'DEAD',e.code)}}"
          echo "=== os.tmpdir + realpath ==="
          node -e "const os=require('os'),fs=require('fs');const t=fs.mkdtempSync(os.tmpdir()+'/probe-');console.log('tmpdir:',os.tmpdir());console.log('mkdtemp:',t);console.log('realpath:',fs.realpathSync(t));console.log('symlink-diff:', t!==fs.realpathSync(t));"
          echo "=== which npm/tsc/eslint (runGate fixture commands) ==="
          which npm tsc eslint 2>&1 || true
          node --version
          echo "=== T4 probe: does os.homedir() respect a HOME override on Linux? ==="
          probe_home="$(mktemp -d)"
          env -u EXTENSION_DIR -u EXTENSION_DIR_TEST HOME="$probe_home" node -e "const os=require('os');const {getExtensionRoot}=require('./services/pickle-utils.js');console.log('env.HOME=',process.env.HOME);console.log('os.homedir()=',os.homedir());console.log('os.userInfo().homedir=',os.userInfo().homedir);console.log('getExtensionRoot()=',getExtensionRoot());console.log('respects_HOME=', os.homedir()===process.env.HOME)"
          echo "=== T4 direct repro: real purge with a fixture HOME (mirrors the failing test) ==="
          fix="$(mktemp -d)"; mkdir -p "$fix/home/.claude/pickle-rick"; echo '{}' > "$fix/home/.claude/pickle-rick/update-check.json"
          echo "T4REPRO cache BEFORE exists=$([ -f "$fix/home/.claude/pickle-rick/update-check.json" ] && echo yes || echo no)"
          env -u EXTENSION_DIR -u EXTENSION_DIR_TEST HOME="$fix/home" TMPDIR="$fix/tmp" node ../bin/purge-update-cache.js 2>&1 | sed 's/^/T4REPRO purge: /' | head
          echo "T4REPRO cache AFTER exists=$([ -f "$fix/home/.claude/pickle-rick/update-check.json" ] && echo yes || echo no)"
          echo "=== T4 EXACT test-pattern repro (node mkdtempSync + spawnSync minimal env, prints purge stderr) ==="
          node -e '
          const {mkdtempSync,mkdirSync,writeFileSync,existsSync}=require("fs");
          const os=require("os"); const path=require("path"); const {spawnSync}=require("child_process");
          const dir=mkdtempSync(path.join(os.tmpdir(),"t4-exact-"));
          const homeDir=path.join(dir,"home");
          const cachePath=path.join(homeDir,".claude","pickle-rick","update-check.json");
          mkdirSync(path.dirname(cachePath),{recursive:true}); writeFileSync(cachePath,"{}");
          console.log("T4EXACT os.tmpdir()=",os.tmpdir());
          console.log("T4EXACT homeDir=",homeDir);
          console.log("T4EXACT before=",existsSync(cachePath));
          const env={PATH:process.env.PATH,HOME:homeDir,TMPDIR:path.join(dir,"tmp"),PICKLE_PURGE_VAR_FOLDERS_ROOT:path.join(dir,"vf")};
          const r=spawnSync("node",[path.resolve(process.cwd(),"../bin/purge-update-cache.js")],{encoding:"utf8",env});
          console.log("T4EXACT status=",r.status);
          console.log("T4EXACT stderr=",(r.stderr||"").trim());
          console.log("T4EXACT after=",existsSync(cachePath));
          '
          echo "=== T4 FULL-scenario repro (cache + tmp-roots + darwin dirs, like test 69) ==="
          node -e '
          const {mkdtempSync,mkdirSync,writeFileSync,existsSync}=require("fs");
          const os=require("os"); const path=require("path"); const {spawnSync}=require("child_process");
          const dir=mkdtempSync(path.join(os.tmpdir(),"t4-full-"));
          const homeDir=path.join(dir,"home"); const tmpRoot=path.join(dir,"tmp"); const vf=path.join(dir,"vf");
          const cachePath=path.join(homeDir,".claude","pickle-rick","update-check.json");
          const tarballDir=path.join(tmpRoot,"pickle-update-fixture");
          const darwinDir=path.join(vf,"zz","12345","T","pickle-update-darwin-fixture");
          mkdirSync(path.dirname(cachePath),{recursive:true}); writeFileSync(cachePath,"{}");
          mkdirSync(tarballDir,{recursive:true}); mkdirSync(darwinDir,{recursive:true});
          const env={PATH:process.env.PATH,HOME:homeDir,TMPDIR:tmpRoot,PICKLE_PURGE_VAR_FOLDERS_ROOT:vf};
          const r=spawnSync("node",[path.resolve(process.cwd(),"../bin/purge-update-cache.js")],{encoding:"utf8",env});
          console.log("T4FULL os.tmpdir-in-test-proc=",os.tmpdir());
          console.log("T4FULL status=",r.status,"stderr=",(r.stderr||"").trim().replace(/\n/g," | "));
          console.log("T4FULL cache_after=",existsSync(cachePath),"tarball_after=",existsSync(tarballDir),"darwin_after=",existsSync(darwinDir));
          '

      - name: Run failing files individually
        working-directory: extension
        shell: bash
        run: |
          mkdir -p ../rcifb-debug-logs
          files=(
            tests/get-session.test.js
            tests/services/convergence-gate-workspaces.test.js
            tests/verify-recapture-fired.test.js
            tests/status.test.js
            tests/check-update.test.js
            tests/check-readiness.test.js
            tests/mux-runner.test.js
            tests/install-agent-overlay.test.js
            tests/mux-runner-guard-logging.test.js
            tests/bin/test-runner-tier-discovery.test.js
            tests/timeout-happy-path.test.js
            tests/purge-update-cache.test.js
          )
          for f in "${files[@]}"; do
            safe=$(echo "$f" | tr '/' '_')
            log="../rcifb-debug-logs/${safe}.log"
            echo "=== $f ===" | tee "$log"
            node --test "$f" > "$log" 2>&1 || true
            # surface just the failures + summary inline for quick scan
            grep -E '^✖|^# fail|^# pass|^# tests|AssertionError|expected:|actual:|code:|Error:|ENOENT|EEXIST' "$log" | head -40 | sed "s|^|[$f] |" || true
          done
      - name: Identify c=8 fast-tier flaky tests (residual-3)
        working-directory: extension
        shell: bash
        # The check-flake-budget tool reports FAIL_BUDGET_EXCEEDED only in aggregate
        # (per-test names swallowed by design). Reproduce the c=8 Linux load-flakes
        # directly: run the full fast tier at --test-concurrency=8 twice and capture
        # the per-test ✖ lines so the flaky set can be serialized per R-TFP.
        run: |
          mkdir -p ../rcifb-debug-logs
          for run in 1 2; do
            log="../rcifb-debug-logs/c8-fast-run${run}.log"
            echo "=== c=8 fast tier run ${run} ===" | tee "$log"
            node bin/test-runner.js --tier fast --test-concurrency=8 >> "$log" 2>&1 || true
            echo "--- run ${run} failing tests (file-level + case-level) ---"
            grep -E '^✖|^ +✖' "$log" | sed "s|^|[c8-run${run}] |" || echo "[c8-run${run}] (no ✖ captured)"
          done
          echo "=== UNION of c=8 failing tests across both runs (R-TFP serialization candidates) ==="
          grep -hE '^✖|^ +✖' ../rcifb-debug-logs/c8-fast-run*.log | sort -u || true
      - name: Upload per-file logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rcifb-debug-logs
          path: rcifb-debug-logs/
